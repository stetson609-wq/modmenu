name: Build Universal Dylib
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Compile Dylib
        run: |
          clang -arch arm64 -arch arm64e \
            -dynamiclib \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -mios-version-min=13.0 \
            -fobjc-arc \
            -O2 \
            modmenu.m \
            -o CheatEngine.dylib
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CheatEngine
          path: CheatEngine.dylib
