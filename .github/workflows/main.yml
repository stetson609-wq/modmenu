EOF

- name: Upload artifacts
uses: actions/upload-artifact@v4
with:
name: CheatEngine-Dylib
path: |
  CheatEngine.dylib
  inject.sh
  install.sh
  README.md
compression-level: 9

release:
needs: build
runs-on: ubuntu-latest
if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')

steps:
- name: Download artifacts
uses: actions/download-artifact@v4
with:
name: CheatEngine-Dylib
path: release

- name: Create ZIP
run: |
cd release
zip -r CheatEngine_v2.0.zip *

- name: Create GitHub Release
uses: softprops/action-gh-release@v1
with:
files: release/CheatEngine_v2.0.zip
tag_name: v2.0
name: CheatEngine iOS v2.0
body: |
  iOS memory editor with progressive value scanning
  - First Scan / Next Scan workflow
  - Filter by Increased/Decreased/Unchanged
  - Int32, Float, Double support
  - Dragable UI overlay
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
